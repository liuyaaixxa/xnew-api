name: Publish Docker image (latest)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      name:
        description: "reason"
        required: false

jobs:
  build_single_arch:
    name: Build & push (${{ matrix.arch }}) [native]
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out (shallow)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1

      - name: Determine version
        id: version
        run: |
          VERSION="latest-$(date +'%Y%m%d')-$(git rev-parse --short HEAD)"
          echo "$VERSION" > VERSION
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Publishing version: $VERSION for ${{ matrix.arch }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (labels)
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: |
            liuyaaixx/xnew-api

      - name: Build & push single-arch
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            liuyaaixx/xnew-api:latest-${{ matrix.arch }}
            liuyaaixx/xnew-api:${{ steps.version.outputs.value }}-${{ matrix.arch }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Sign image with cosign
        run: cosign sign --yes "liuyaaixx/xnew-api@${{ steps.build.outputs.digest }}"

      - name: Output digest
        run: |
          {
            echo "### Docker Image Digest (${{ matrix.arch }})"
            echo '```'
            echo "liuyaaixx/xnew-api:latest-${{ matrix.arch }}"
            echo "${{ steps.build.outputs.digest }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  create_manifests:
    name: Create multi-arch manifests
    needs: [build_single_arch]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out (shallow)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1

      - name: Determine version
        id: version
        run: |
          VERSION="latest-$(date +'%Y%m%d')-$(git rev-parse --short HEAD)"
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create & push manifest (Docker Hub - latest)
        run: |
          docker buildx imagetools create \
            -t liuyaaixx/xnew-api:latest \
            liuyaaixx/xnew-api:latest-amd64 \
            liuyaaixx/xnew-api:latest-arm64

      - name: Create & push manifest (Docker Hub - versioned)
        run: |
          docker buildx imagetools create \
            -t "liuyaaixx/xnew-api:${VERSION}" \
            "liuyaaixx/xnew-api:${VERSION}-amd64" \
            "liuyaaixx/xnew-api:${VERSION}-arm64"

      - name: Output manifest digest
        run: |
          {
            echo "### Multi-arch Manifest Digests"
            echo '```'
            docker buildx imagetools inspect liuyaaixx/xnew-api:latest
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  deploy_ec2:
    name: Deploy to EC2
    needs: [create_manifests]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "==> Pulling latest image..."
            sudo docker pull liuyaaixx/xnew-api:latest

            echo "==> Stopping old container..."
            sudo docker stop xnew-api || true
            sudo docker rm xnew-api || true

            echo "==> Starting new container..."
            sudo docker run -d \
              --name xnew-api \
              --restart always \
              --network host \
              -e TZ=Asia/Shanghai \
              -e FRONTEND_BASE_URL=https://teniuapi.online \
              -e SQL_DSN="root:teniuapi666@tcp(127.0.0.1:3306)/xnew-api?charset=utf8mb4&parseTime=True&loc=Local" \
              -e REDIS_CONN_STRING="redis://127.0.0.1:6379" \
              -e SYNC_FREQUENCY=60 \
              -e MEMORY_CACHE_ENABLED=true \
              -e CHANNEL_UPDATE_FREQUENCY=30 \
              -e BATCH_UPDATE_ENABLED=true \
              -e BATCH_UPDATE_INTERVAL=5 \
              -v /opt/new-api/data:/data \
              liuyaaixx/xnew-api:latest

            echo "==> Waiting for container to start..."
            sleep 5

            echo "==> Container status:"
            sudo docker ps --filter name=xnew-api --format "table {{.ID}}\t{{.Status}}\t{{.Ports}}"

            echo "==> Cleaning up old images..."
            sudo docker image prune -f

            echo "==> Deploy complete!"
